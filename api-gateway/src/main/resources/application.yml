server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        # Auth service — PUBLIC, no JWT filter applied
        - id: auth-service
          uri: http://auth-service:8084
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=0

        # Order service — PROTECTED
        - id: order-service
          uri: http://order-service:8081
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=0

        # Product service — PROTECTED
        - id: product-service
          uri: http://product-service:8082
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=0

        # Payment service — PROTECTED
        - id: payment-service
          uri: http://payment-service:8083
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=0

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

# JWT secret — MUST match auth-service exactly!
jwt:
  secret: ecommerce-super-secret-key-must-be-at-least-256-bits-long-for-hs256

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    gateway:
      enabled: true