name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  JAVA_VERSION: '17'

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: List built JARs
        run: |
          echo "=== Built JARs ==="
          find . -name "*.jar" -not -path "*/original*" -not -path "*/.m2/*"

      - name: Upload JARs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: |
            api-gateway/target/*.jar
            auth-service/target/*.jar
            order-service/target/*.jar
            product-service/target/*.jar
            payment-service/target/*.jar
            notification-service/target/*.jar
          if-no-files-found: error
          retention-days: 1

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JARs
        uses: actions/download-artifact@v4
        with:
          name: service-jars

      - name: Verify JARs
        run: |
          echo "=== Downloaded JARs ==="
          find . -name "*.jar" -not -path "*original*"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          file: ./api-gateway/Dockerfile.ci
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-api-gateway:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          file: ./auth-service/Dockerfile.ci
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-auth-service:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-auth-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Order Service
        uses: docker/build-push-action@v5
        with:
          context: ./order-service
          file: ./order-service/Dockerfile.ci
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-order-service:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-order-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Product Service
        uses: docker/build-push-action@v5
        with:
          context: ./product-service
          file: ./product-service/Dockerfile.ci
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-product-service:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-product-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Payment Service
        uses: docker/build-push-action@v5
        with:
          context: ./payment-service
          file: ./payment-service/Dockerfile.ci
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-payment-service:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-payment-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Notification Service
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          file: ./notification-service/Dockerfile.ci
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-notification-service:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-notification-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pipeline Summary
        run: |
          echo "## 🚀 Docker Images Pushed!" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| api-gateway | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| auth-service | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| order-service | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| product-service | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| payment-service | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| notification-service | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
