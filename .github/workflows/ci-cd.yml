name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  JAVA_VERSION: '17'

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: List built JARs
        run: |
          echo "=== Built JARs ==="
          find . -name "*.jar" \
            -not -path "*/original*" \
            -not -path "*/.m2/*" \
            -not -path "*/shared-models/*"

      # Upload each service JAR separately
      # This preserves exact paths when downloading
      - name: Upload api-gateway JAR
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-jar
          path: api-gateway/target/*.jar
          if-no-files-found: error

      - name: Upload auth-service JAR
        uses: actions/upload-artifact@v4
        with:
          name: auth-service-jar
          path: auth-service/target/*.jar
          if-no-files-found: error

      - name: Upload order-service JAR
        uses: actions/upload-artifact@v4
        with:
          name: order-service-jar
          path: order-service/target/*.jar
          if-no-files-found: error

      - name: Upload product-service JAR
        uses: actions/upload-artifact@v4
        with:
          name: product-service-jar
          path: product-service/target/*.jar
          if-no-files-found: error

      - name: Upload payment-service JAR
        uses: actions/upload-artifact@v4
        with:
          name: payment-service-jar
          path: payment-service/target/*.jar
          if-no-files-found: error

      - name: Upload notification-service JAR
        uses: actions/upload-artifact@v4
        with:
          name: notification-service-jar
          path: notification-service/target/*.jar
          if-no-files-found: error

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download each JAR into its correct target/ folder
      - name: Download api-gateway JAR
        uses: actions/download-artifact@v4
        with:
          name: api-gateway-jar
          path: api-gateway/target/

      - name: Download auth-service JAR
        uses: actions/download-artifact@v4
        with:
          name: auth-service-jar
          path: auth-service/target/

      - name: Download order-service JAR
        uses: actions/download-artifact@v4
        with:
          name: order-service-jar
          path: order-service/target/

      - name: Download product-service JAR
        uses: actions/download-artifact@v4
        with:
          name: product-service-jar
          path: product-service/target/

      - name: Download payment-service JAR
        uses: actions/download-artifact@v4
        with:
          name: payment-service-jar
          path: payment-service/target/

      - name: Download notification-service JAR
        uses: actions/download-artifact@v4
        with:
          name: notification-service-jar
          path: notification-service/target/

      # Verify all JARs are in correct locations
      - name: Verify JARs
        run: |
          echo "=== Verifying JAR locations ==="
          ls -la api-gateway/target/*.jar
          ls -la auth-service/target/*.jar
          ls -la order-service/target/*.jar
          ls -la product-service/target/*.jar
          ls -la payment-service/target/*.jar
          ls -la notification-service/target/*.jar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api-gateway/Dockerfile.ci
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-api-gateway:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-api-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Auth Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: auth-service/Dockerfile.ci
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-auth-service:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-auth-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Order Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: order-service/Dockerfile.ci
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-order-service:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-order-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Product Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: product-service/Dockerfile.ci
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-product-service:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-product-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Payment Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: payment-service/Dockerfile.ci
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-payment-service:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-payment-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Notification Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: notification-service/Dockerfile.ci
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-notification-service:latest
            ${{ secrets.DOCKER_USERNAME }}/ecommerce-notification-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pipeline Summary
        run: |
          echo "## 🚀 Docker Images Pushed!" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| api-gateway | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| auth-service | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| order-service | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| product-service | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| payment-service | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| notification-service | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
